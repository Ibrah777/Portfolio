<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#071a0f;color:#f0f7f2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1.5rem 1rem}
.back-btn{align-self:flex-start;display:flex;align-items:center;gap:.5rem;background:#0d2a18;border:1px solid #22c55e;color:#86efac;font-size:.82rem;font-weight:600;padding:.45rem .9rem;border-radius:8px;cursor:pointer;text-decoration:none;margin-bottom:1.2rem;transition:background .2s}
.back-btn:hover{background:#163d24}
.back-btn svg{width:14px;height:14px}
h1{font-size:1.1rem;color:#22c55e;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.3rem;font-weight:700}
p.sub{font-size:.8rem;color:#2d5a3d;margin-bottom:2rem}
.map{position:relative;width:900px;max-width:100%;height:620px}
svg{width:100%;height:100%}
.node{cursor:pointer;transition:transform .2s}
.center-text{fill:#fff;font-weight:700;font-size:14px;font-family:'Segoe UI',sans-serif}
.branch-text{fill:#dcfce7;font-size:11px;font-family:'Segoe UI',sans-serif;font-weight:600}
.leaf-text{fill:#86efac;font-size:9.5px;font-family:'Segoe UI',sans-serif}
.connector{fill:none;stroke-width:2;opacity:.6}
.tooltip{position:absolute;background:#0d2a18;border:1px solid #22c55e;border-radius:10px;padding:.75rem 1rem;font-size:.82rem;color:#dcfce7;max-width:240px;line-height:1.5;pointer-events:none;opacity:0;transition:opacity .2s;z-index:10;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.legend{display:flex;gap:1.5rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:#2d5a3d}
.legend-dot{width:10px;height:10px;border-radius:50%}
</style>

<div class="legend">

  <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>Déploiement</div>
  <div class="legend-item"><div class="legend-dot" style="background:#15803d"></div>Missions</div>
  <div class="legend-item"><div class="legend-dot" style="background:#166534"></div>Qualité</div>
</div>

<script>
const infos = {
  center: {t:"Développeur Web Full-Stack", d:"Maîtrise à la fois le front-end (interface utilisateur) et le back-end (serveur, base de données). C'est une compétence transversale que je développe notamment à travers ce portfolio (React + FastAPI + MongoDB)."},
  frontend: {t:"Front-end & UI", d:"Le front-end gère tout ce que l'utilisateur voit et avec quoi il interagit. React est le framework que j'utilise sur ce portfolio. HTML, CSS et JavaScript en sont les fondations."},
  backend: {t:"Back-end & API", d:"Le back-end gère la logique serveur, les données et la sécurité. FastAPI (Python) propulse l'API de ce portfolio. Node.js et PHP sont aussi très répandus dans l'écosystème web."},
  bdd: {t:"Bases de données", d:"Stocker et récupérer les données de l'application. MySQL et PostgreSQL pour les bases relationnelles, MongoDB pour le NoSQL (utilisé dans ce portfolio). Redis pour le cache, Supabase pour les solutions modernes."},
  deploy: {t:"Déploiement & DevOps", d:"Mettre l'application en production et la maintenir. Vercel pour le front-end React, Render pour le back-end FastAPI, MongoDB Atlas pour la base. Docker et CI/CD automatisent les mises en production."},
  missions: {t:"Missions du métier", d:"Concevoir des interfaces (UI/UX), intégrer des API tierces, maintenir et débugger des applications existantes, optimiser les performances. Le full-stack intervient sur toute la chaîne de valeur."},
  qualite: {t:"Qualité & Méthodes", d:"Écrire du code maintenable grâce aux principes SOLID, DRY et KISS. Utiliser Git pour versionner, écrire des tests unitaires pour valider. Ces bonnes pratiques sont enseignées en BTS SIO SLAM."},
  l1a: {t:"React / Vue", d:"React (Meta) et Vue.js sont les deux frameworks front-end les plus populaires. Je développe ce portfolio avec React — composants réutilisables, gestion d'état, hooks pour les effets."},
  l1b: {t:"HTML / CSS / JavaScript", d:"Les trois piliers du web. HTML structure le contenu, CSS le met en forme, JavaScript le rend interactif. Toute techno front-end repose dessus."},
  l1c: {t:"Tailwind / Bootstrap", d:"Frameworks CSS qui accélèrent le design. Tailwind (utility-first) est utilisé dans ce portfolio pour des styles précis sans CSS custom. Bootstrap est plus opinioné mais très répandu."},
  l2a: {t:"Python / FastAPI", d:"FastAPI est le framework Python moderne pour créer des API REST rapides et documentées automatiquement (Swagger). C'est le back-end de ce portfolio."},
  l2b: {t:"Node.js / PHP", d:"Node.js permet d'utiliser JavaScript côté serveur — idéal pour les applications temps réel. PHP est encore très répandu (WordPress, Laravel) et reste enseigné en BTS SIO SLAM."},
  l2c: {t:"REST API / GraphQL", d:"REST est l'architecture standard pour les API web (HTTP + JSON). GraphQL est une alternative flexible qui permet au client de demander exactement les données dont il a besoin."},
  l3a: {t:"MySQL / PostgreSQL", d:"Bases relationnelles (tables, SQL). MySQL est très répandu en hébergement mutualisé. PostgreSQL est plus puissant et recommandé pour les applications sérieuses. Appris en BTS SIO."},
  l3b: {t:"MongoDB", d:"Base NoSQL orientée documents (JSON). Flexible, adapté aux données changeantes. C'est la base utilisée dans ce portfolio avec MongoDB Atlas pour l'hébergement cloud."},
  l3c: {t:"Redis / Supabase", d:"Redis est une base en mémoire utilisée pour le cache et les sessions. Supabase est une alternative open source à Firebase (back-end as a service avec PostgreSQL)."},
  l4a: {t:"Vercel / Render", d:"Vercel déploie les applications React automatiquement depuis GitHub. Render héberge les API FastAPI. Ce sont les plateformes prévues pour déployer ce portfolio."},
  l4b: {t:"Docker / CI/CD", d:"Docker containerise l'application pour un déploiement cohérent. Les pipelines CI/CD (GitHub Actions) automatisent les tests et déploiements à chaque push."},
  l5a: {t:"Conception UI/UX", d:"Concevoir des interfaces intuitives et esthétiques. Penser l'expérience utilisateur (UX) avant de coder. Des outils comme Figma permettent de prototyper avant de développer."},
  l5b: {t:"Intégration API", d:"Connecter l'application à des services tiers via leur API. Exemple concret : ce portfolio intègre l'API RAWG.io pour récupérer les actualités gaming en temps réel."},
  l5c: {t:"Maintenance & Debug", d:"Corriger les bugs, mettre à jour les dépendances, améliorer les performances. La maintenance représente souvent plus de 60% du travail d'un développeur en entreprise."},
  l6a: {t:"Git / GitHub", d:"Versionner le code, collaborer en équipe, gérer les branches et les pull requests. GitHub héberge les projets publics — dont les repos de ce portfolio."},
  l6b: {t:"Tests unitaires", d:"Vérifier qu'une fonction produit le bon résultat. Éviter les régressions lors des modifications. Appris en BTS SIO avec les frameworks de test selon le langage (JUnit, pytest...)."},
  l6c: {t:"SOLID / DRY / KISS", d:"Principes de qualité logicielle. SOLID pour la conception objet, DRY (Don't Repeat Yourself) pour éviter la duplication, KISS (Keep It Simple) pour limiter la complexité inutile."},
};

const tip = document.getElementById('tooltip');
const container = document.getElementById('mapContainer');

function showInfo(key) {
  const d = infos[key];
  if (!d) return;
  tip.innerHTML = `<strong style="color:#4ade80">${d.t}</strong><br/><span style="color:#86efac">${d.d}</span>`;
  tip.style.opacity = '1';
  setTimeout(() => { tip.style.opacity = '0'; }, 4500);
}

container.addEventListener('mousemove', e => {
  const r = container.getBoundingClientRect();
  let x = e.clientX - r.left + 12;
  let y = e.clientY - r.top + 12;
  if (x + 260 > r.width) x = e.clientX - r.left - 260;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
});
</script>
