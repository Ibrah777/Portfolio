<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0e0d;color:#f0ebe6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1.5rem 1rem}
h1{font-size:1.1rem;color:#f97060;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.3rem;font-weight:700}
p.sub{font-size:.8rem;color:#6b5f58;margin-bottom:2rem}
.map{position:relative;width:900px;max-width:100%;height:620px}
svg{width:100%;height:100%}
.node{cursor:pointer;transition:transform .2s}
.node:hover{transform-origin:center center}
.center-circle{fill:#f97060}
.center-text{fill:#fff;font-weight:700;font-size:14px;font-family:'Segoe UI',sans-serif}
.branch-circle{fill:#2a211c;stroke-width:2}
.branch-text{fill:#f0ebe6;font-size:11px;font-family:'Segoe UI',sans-serif;font-weight:600}
.leaf-rect{rx:8;ry:8;fill:#1e1713;stroke-width:1.5}
.leaf-text{fill:#c4b8b0;font-size:9.5px;font-family:'Segoe UI',sans-serif}
.connector{fill:none;stroke-width:2;opacity:.6}
.tooltip{position:absolute;background:#2a211c;border:1px solid #f97060;border-radius:10px;padding:.75rem 1rem;font-size:.82rem;color:#f0ebe6;max-width:240px;line-height:1.5;pointer-events:none;opacity:0;transition:opacity .2s;z-index:10;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.legend{display:flex;gap:1.5rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:#6b5f58}
.legend-dot{width:10px;height:10px;border-radius:50%}
.back-btn{align-self:flex-start;display:flex;align-items:center;gap:.5rem;background:#1a100d;border:1px solid #f97060;color:#fca99c;font-size:.82rem;font-weight:600;padding:.45rem .9rem;border-radius:8px;cursor:pointer;text-decoration:none;margin-bottom:1.2rem;transition:background .2s}
.back-btn:hover{background:#2a1a15}
.back-btn svg{width:14px;height:14px}
</style>
</head>

<g class="node" onclick="showInfo('l6c')"><rect x="8" y="383" width="90" height="26" class="leaf-rect" stroke="#6b5f58"/><text x="53" y="400" text-anchor="middle" class="leaf-text">Blender / Maya</text></g>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f97060"></div>Compétences techniques</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e8734a"></div>Langages & Moteurs</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d4956e"></div>Secteurs</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c4b8b0"></div>Formations</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8a7a72"></div>Missions</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6b5f58"></div>Outils</div>
</div>

<script>
const infos = {
  center: {t:"Développeur Jeu Vidéo", d:"Conçoit et programme les mécaniques d'un jeu vidéo : moteur physique, gameplay, IA des personnages, interfaces. C'est le métier que je vise après le BTS SIO SLAM."},
  competences: {t:"Compétences techniques", d:"Un développeur jeu vidéo doit maîtriser la programmation orientée objet, les mathématiques (vecteurs, matrices) et les principes de physique pour simuler les interactions dans le jeu."},
  langages: {t:"Langages & Moteurs", d:"Les langages principaux sont C++ (Unreal Engine), C# (Unity) et Python. Les moteurs de jeu (Unity, Unreal, Godot) fournissent les outils pour créer des environnements 3D/2D."},
  secteurs: {t:"Secteurs & Débouchés", d:"Studios AAA (Ubisoft, EA), studios indépendants (indie), simulation industrielle, réalité virtuelle (VR/AR). Le marché du jeu vidéo est l'un des plus dynamiques du secteur numérique."},
  formations: {t:"Formations & Écoles", d:"Après le BTS SIO, je vise une licence pro ou une école spécialisée comme ISART Digital, Brassart ou EPITECH Game Institute pour me spécialiser dans le développement de jeux."},
  missions: {t:"Missions du métier", d:"Programmer le gameplay, concevoir l'IA des ennemis, implémenter le moteur physique, collaborer avec les game designers et les artistes 3D pour créer une expérience cohérente."},
  outils: {t:"Outils & Logiciels", d:"Git/GitHub pour la gestion du code, Visual Studio / VS Code comme IDE, Blender ou Maya pour les assets 3D, et les moteurs Unity ou Unreal Engine pour l'environnement de développement."},
  l1a: {t:"Programmation", d:"POO, design patterns (Singleton, Observer, Factory), algorithmes et structures de données sont essentiels pour coder un jeu vidéo robuste et maintenable."},
  l1b: {t:"Mathématiques", d:"Vecteurs, matrices, trigonométrie, quaternions pour les rotations 3D. Les maths sont omniprésentes dans les moteurs de jeu pour gérer les positions, mouvements et collisions."},
  l1c: {t:"Physique de jeu", d:"Simulation des lois physiques : gravité, collisions, forces. Des moteurs comme Box2D (2D) ou PhysX (3D) gèrent ces calculs, mais le développeur doit en comprendre les bases."},
  l2a: {t:"C++ / C#", d:"C++ est le langage d'Unreal Engine, très performant. C# est utilisé dans Unity, plus accessible. Je maîtrise C# via ma formation BTS SIO SLAM."},
  l2b: {t:"Unity / Unreal Engine", d:"Unity (C#) est idéal pour les indépendants et le mobile. Unreal (C++) est utilisé pour les productions AAA photoréalistes. Les deux sont gratuits pour commencer."},
  l2c: {t:"Python / GDScript", d:"Python est utilisé pour le scripting et les outils de pipeline. GDScript est le langage natif de Godot Engine, moteur open source en pleine expansion."},
  l3a: {t:"Studios AAA", d:"Ubisoft, Electronic Arts, Activision, Naughty Dog... Ces grands studios emploient des centaines de développeurs. Ils offrent des salaires élevés mais demandent une forte expérience."},
  l3b: {t:"Indépendant (Indie)", d:"De nombreux développeurs créent leurs propres jeux en petites équipes. Les plateformes Steam et itch.io permettent de les distribuer facilement. Minecraft a commencé comme un projet indie !"},
  l3c: {t:"Simulation & VR", d:"Secteurs en croissance : simulateurs de formation (armée, médecine), réalité virtuelle (Meta Quest, PlayStation VR) et réalité augmentée. Les compétences sont très proches du jeu vidéo."},
  l4a: {t:"ISART Digital", d:"École de référence en France pour le jeu vidéo et les effets spéciaux. Propose des bachelors et masters reconnus par les studios. Basée à Paris, Lyon et Montréal."},
  l4b: {t:"Brassart / EPITECH", d:"Brassart forme aux métiers créatifs numériques. EPITECH Game Institute est spécialisé dans le développement de jeux. Ces écoles peuvent s'intégrer après un BTS."},
  l5a: {t:"Gameplay", d:"Programmer les règles du jeu, les interactions joueur/environnement, le système de score, les niveaux. C'est le cœur créatif du métier de développeur jeu vidéo."},
  l5b: {t:"IA & Ennemis", d:"Concevoir le comportement des personnages non-joueurs (PNJ) : pathfinding (A*), machines à états, arbres de comportement. Une IA bien faite rend le jeu immersif."},
  l5c: {t:"Moteur physique", d:"Implémenter la gravité, les collisions, les rebonds, les explosions. Utiliser des bibliothèques physiques ou coder ses propres algorithmes pour des comportements réalistes."},
  l6a: {t:"Git / GitHub", d:"Indispensable pour travailler en équipe sur un projet de jeu. Gestion des versions, branches pour les features, pull requests pour la revue de code. Appris en BTS SIO."},
  l6b: {t:"Visual Studio / VS Code", d:"IDEs utilisés pour développer en C# (Unity) ou C++ (Unreal). Offrent débogage, autocomplétion et intégration Git. Visual Studio est l'outil principal de mon BTS."},
  l6c: {t:"Blender / Maya", d:"Logiciels de modélisation 3D pour créer les assets du jeu. Blender est gratuit et open source, Maya est l'outil standard dans les studios professionnels."},
};

const tip = document.getElementById('tooltip');
const container = document.getElementById('mapContainer');

function showInfo(key) {
  const d = infos[key];
  if (!d) return;
  tip.innerHTML = `<strong style="color:#f97060">${d.t}</strong><br/><span style="color:#c4b8b0">${d.d}</span>`;
  tip.style.opacity = '1';
  setTimeout(() => { tip.style.opacity = '0'; }, 4000);
}

container.addEventListener('mousemove', e => {
  const r = container.getBoundingClientRect();
  let x = e.clientX - r.left + 12;
  let y = e.clientY - r.top + 12;
  if (x + 260 > r.width) x = e.clientX - r.left - 260;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
});
</script>
</body>
</html>
